<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Cartões de Crédito</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestão de Cartões</h1>
            <div class="filters">
                <label for="cardFilter">Filtrar por Cartão:</label>
                <select id="cardFilter">
                    <option value="all">Todos os Cartões</option>
                </select>
            </div>
        </header>

        <main>
            <div class="chart-container">
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="barChart"></canvas>
            </div>
        </main>

        <footer class="debug-section">
            <div class="debug-header">
                <span>Versão: <span id="appVersion">1.0.1</span></span>
                <button id="copyLog">Copiar Log</button>
                <button id="clearLog">Limpar</button>
            </div>
            <div id="debugLog" class="debug-log"></div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
